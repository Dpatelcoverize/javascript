<html>
    <body>
        Enter your age: 
        <input type="number" id="age">

        <button onclick="checkAge()">Check</button>

        <script>

            function checkAge(){

                let age = Number(document.getElementById("age").value);

                if (age >= 18){
                    alert("You are eligible to vote");
                }
                else{
                    alert("You are not eligible to vote");
                }
            }
        </script>
    </body>
</html>
