<html>
    <body>
        <script>
            let day = 2;

            switch(day){
                case 1:
                    alert("Monday");
                    break;
                case 2:
                    alert("Tuesday");
                    break;
                case 3:
                    alert("Wednesday");
                    break;
                default:
                    alert("Invalid Day");
            }
        </script>
    </body>
</html>
