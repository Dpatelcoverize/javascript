<html>
    <body>

        Enter first word:
        <input type="text" id="text1"><br><br>

        Enter second word:
        <input type="text" id="text2"><br><br>

        <button onclick="compare()">Compare</button>

        <script>

            function compare(){

                let a = document.getElementById("text1").value;
                let b = document.getElementById("text2").value;

                if(a == b){
                    alert("String are equal");
                }
                else{
                    alert("Strings are different");
                }
            }
        </script>
    </body>
</html>
