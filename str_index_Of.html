<html>
    <body>
        <h2>String indexOf()</h2>

        <p id="output"></p>

        <script>
            let str = "Hello World";

            //Find position
            let position = str.indexOf("World");

            //Display output
            document.getElementById("output").innerHTML =
                "String: " + str + "<br>" +
                "Index of 'World': " + position;
        </script>
    </body>
</html>
