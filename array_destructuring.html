<html>
    <body>
        <p id="output"></p>

        <script>
            let arr = ["Devanshi", 20, "Ahmedabad"];

            //Destructuring
            let [name, age, city] = arr;

            document.getElementById("output").innerHTML =
                "Name: " + name + "<br>" +
                "Age: " + age + "<br>" +
                "City: " + city;
        </script>
    </body>
</html>
