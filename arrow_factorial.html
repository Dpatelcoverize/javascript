<html>
    <body>
        <input type="number" id="num">
        <button onclick="showFact()">Factorial</button>
        <script>
            let factorial = n =>{
                let fact = 1;

                for (let i = 1; i <= n; i++){
                    fact = fact * i;
                }
                return fact;
            };
            function showFact(){
                let n = document.getElementById("num").value;
                alert(factorial(n));
            }
        </script>
    </body>
</html>
