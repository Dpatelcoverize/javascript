<html>
    <body>
        <script>
            //A function expression is a function stored inside a variable
            //SYNTAX: let variable = function(parameters){
            // *code*};
            let greet = function(){  //a function is assigned to the variable greet
                alert("Hello!");  //greet() calls the function
            };
            greet();

        </script>
