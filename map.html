<html>
    <body>
        <h2>MAP</h2>

        <p id="output"></p>

        <script>
            //Create Map
            let map = new Map();

            //Add values
            map.set("name", "Devanshi");
            map.set("age", 20);
            map.set(1, "Number Key");

            //Get values
            let name = map.get("name");

            //Check key
            let hasAge = map.has("age");

            //Size
            let size = map.size;

            //Delete key
            map.delete(1);

            //Display output
            let result = "";

            result += "Name: " + name + "<br>";
            result += "Has age: " + hasAge + "<br>";
            result += "Size after delete: " + size + "<br><br>";

            //Loop through map
            result += "<b>All values: </b><br>";

            for (let [key, value] of map) {
                result += key + " : " + value + "<br>";
            }

            document.getElementById("output").innerHTML = result;
        </script>
    </body>
</html>
