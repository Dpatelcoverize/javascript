<html>
    <body>

        <input type = "number" id="number">
        <button onclick="check()">Check</button>

        <script>
            function check(){

                let n = Number(document.getElementById("number").value);

                if (n % 2 == 0){
                    alert("Even Number")
                }
                else{
                    alert("Odd Number")
                }
            }
        </script>
    </body>
</html>
