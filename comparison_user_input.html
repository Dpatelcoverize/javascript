<html>
    <body>

        Enter a number:
        <input type="number" id="num">

        <button onclick="check()">Check</button>

        <script>

            function check(){

                let n = Number(document.getElementById("num").value);

                if(n > 10){
                    alert("Number is greater than 10");
                }
                else{
                    alert("Number is 10 or smaller");
                }
            }
        </script>
    </body>
</html>
