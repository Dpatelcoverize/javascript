<html>
    <body>
        <h2>Simple Switch Case</h2>
        <p id = "demo"></p>

        <script>
            let day = 3;
            let result;

            switch(day){
                case 1:
                    result = "Monday";
                    break;
                case 2:
                    result = "Tuesday";
                    break;
                case 3:
                    result = "Wednesday";
                    break;
                case 4:
                    result = "Thursday";
                    break;
                case 5:
                    result = "Friday";
                    break;
                case 6:
                    result = "Saturday";
                    break;
                case 7:
                    result = "Sunday";
                    break;
                default:
                    result = "Invalid Day";
            }

            document.getElementById("demo").innerHTML = result;
        </script>
    </body>
</html>
