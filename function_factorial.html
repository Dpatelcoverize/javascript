<html>
    <body>
        Enter a number:
        <input type = "number" id = "num">

        <button onclick="findFactorial()">Find Factorial</button>

        <script>

            function findFactorial(){

                let num = Number(document.getElementById("num").value);
                let fact = 1;

                for(let i = 1; i <= num; i++){
                    fact = fact * i;
                }

                alert("Factorial: " + fact);
                
            }
        </script>
    </body>
</html>
