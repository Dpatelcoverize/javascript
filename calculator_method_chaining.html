<html>
    <body>
        <h2>Calculator with Method Chaining</h2>

        <p id="result"></p>

        <script>

            let calculator = {
                value: 0,

                add: function(num){
                    this.value += num;
                    return this;
                },
                substract: function(num){
                this.value -= num;
                return this;
                },
                multiply: function(num){
                this.value *= num;
                return this;
                },
                divide: function(num){
                this.value /= num;
                return this;
                },
                show: function(){
                    document.getElementById("result").innerHTML = "Result: " + this.value;
                }
            };

            calculator.add(10).substract(2).multiply(3).divide(2).show();
            
        </script>
    </body>
</html>
