<html>
    <body>

        <p id="result"></p>

        <script>

            let user = {
                name: "Devanshi",
                age: 21
            };

            let clone = {};

            for(let key in user){
                clone[key] = user[key];
            }

            clone.name = "Admin";

            document.getElementById("result").innerHTML = user.name;
            
        </script>
    </body>
</html>
