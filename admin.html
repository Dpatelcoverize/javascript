<html>
    <body>

        Enter username:
        <input type = "text" id = "username">

        <button onclick="checkUser()">Check</button>

        <script>

            function checkUser(){

                let user = document.getElementById("username").value;

                if(user == "admin"){
                    alert("Welcome Admin");
                }
                else{
                    alert("Access Denied");
                }
            }
        </script>
    </body>
</html>
